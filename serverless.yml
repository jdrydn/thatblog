# yaml-language-server: $schema=https://raw.githubusercontent.com/lalcebo/json-schema/823e19d/serverless/reference.json
service: thatblog
frameworkVersion: '4'

provider:
  name: aws
  stage: ${opt:stage, 'prod'}
  runtime: nodejs24.x
  deploymentBucket:
    name: ${self:service}-${sls:stage}-${aws:accountId}-${aws:region}
    maxPreviousDeploymentArtifacts: 10
    blockPublicAccess: false
    versioning: false
    serverSideEncryption: AES256
  deploymentPrefix: serverless
  iam:
    role:
      name: ${self:service}-${sls:stage}-${aws:accountId}-${aws:region}
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - Fn::GetAtt: [UsersTable, Arn]
  environment:
    USERS_TABLE: ${self:service}-${sls:stage}

functions:
  api:
    name: ${self:service}-${sls:stage}
    handler: handler.handler
    events:
      - httpApi: "*"

build:
  esbuild:
    bundle: true
    buildConcurrency: 1
    minify: false
    sourcemap:
      type: linked
      setNodeOptions: true

plugins:
  - serverless-deployment-bucket
  # - serverless-s3-deploy

custom:
  deploymentBucket:
    versioning: false
    accelerate: false
    blockPublicAccess: false

